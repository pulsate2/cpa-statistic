# Deploy Cloudflare Worker + D1 schema + secrets + static assets (web/dist).
# Runs on push to main, or manually via workflow_dispatch.
#
# Required GitHub repo Secrets:
#   CLOUDFLARE_API_TOKEN      — Account API Token with Workers Scripts Edit, Workers KV, D1 Edit, Account Settings Read
#   CLOUDFLARE_ACCOUNT_ID     — e.g. ceef02e63c625bc88a01acbe89103cc1
#   CPA_BASE_URL              — CPA management base URL (no trailing slash)
#   CPA_MANAGEMENT_KEY         — CPA management API key
#   DASHBOARD_PASSWORD        — dashboard login password (optional but recommended)
#
# Optional Variables (Settings → Variables):
#   WORKER_NAME               — default: cpa-statistics
#   APPLY_D1_SCHEMA           — "true" (default) to run schema.sql on every deploy

name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      apply_schema:
        description: "Run D1 schema.sql against remote"
        type: boolean
        default: true
      skip_secrets:
        description: "Skip wrangler secret put (keep existing)"
        type: boolean
        default: false

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy to Cloudflare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WORKER_NAME: ${{ vars.WORKER_NAME || 'cpa-statistics' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install web dependencies
        run: npm ci --prefix web

      - name: Build dashboard (web/dist)
        run: npm run build:web

      - name: Typecheck worker
        run: npm run typecheck
        continue-on-error: true

      - name: Check Cloudflare credentials
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Missing CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID secrets"
            exit 1
          fi
          npx wrangler whoami

      - name: Apply D1 schema (remote)
        if: >-
          ${{
            (github.event_name == 'workflow_dispatch' && inputs.apply_schema) ||
            (github.event_name != 'workflow_dispatch' && (vars.APPLY_D1_SCHEMA || 'true') == 'true')
          }}
        run: |
          npx wrangler d1 execute cpa-statistics --remote --file=./schema.sql

      - name: Deploy Worker + assets
        run: |
          npx wrangler deploy --name "$WORKER_NAME"

      - name: Sync Worker secrets
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_secrets) }}
        env:
          CPA_BASE_URL: ${{ secrets.CPA_BASE_URL }}
          CPA_MANAGEMENT_KEY: ${{ secrets.CPA_MANAGEMENT_KEY }}
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          set -euo pipefail
          put_secret() {
            local name="$1"
            local value="$2"
            if [ -z "${value:-}" ]; then
              echo "skip secret $name (empty)"
              return 0
            fi
            printf '%s' "$value" | npx wrangler secret put "$name" --name "$WORKER_NAME"
            echo "secret $name ok"
          }
          put_secret CPA_BASE_URL "$CPA_BASE_URL"
          put_secret CPA_MANAGEMENT_KEY "$CPA_MANAGEMENT_KEY"
          put_secret DASHBOARD_PASSWORD "$DASHBOARD_PASSWORD"

      - name: Smoke check workers.dev
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          set -euo pipefail
          # Resolve workers.dev subdomain
          SUB=$(curl -sS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/subdomain" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['subdomain'])")
          URL="https://${WORKER_NAME}.${SUB}.workers.dev"
          echo "URL=$URL" >> "$GITHUB_STEP_SUMMARY"
          echo "### Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Worker: \`$WORKER_NAME\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: $URL" >> "$GITHUB_STEP_SUMMARY"

          # Enable workers.dev route if needed
          curl -sS -X POST -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"enabled":true}' \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}/subdomain" \
            >/dev/null || true

          code=$(curl -sS -o /tmp/home.html -w "%{http_code}" --max-time 30 "$URL/" || true)
          echo "GET / → HTTP $code" | tee -a "$GITHUB_STEP_SUMMARY"
          if [ "$code" != "200" ]; then
            echo "::warning::Homepage returned $code (assets may still be propagating)"
            head -c 400 /tmp/home.html || true
          fi

          # Auth session probe (no password needed for this endpoint shape)
          scode=$(curl -sS -o /tmp/session.json -w "%{http_code}" --max-time 30 \
            "$URL/api/v1/auth/session" || true)
          echo "GET /api/v1/auth/session → HTTP $scode" | tee -a "$GITHUB_STEP_SUMMARY"
          cat /tmp/session.json 2>/dev/null | head -c 200 || true
          echo
